{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20 px-4" data-aos="zoom-in">
    <div class="glass-card p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Welcome Back</h2>
            <p class="text-gray-400 mt-2 text-sm">Login to make your predictions</p>
        </div>
        
        <form method="POST" action="">
            <div class="mb-4">
                <label class="block text-gray-300 text-sm font-bold mb-2" for="mobile">
                    Mobile Number
                </label>
                <input class="glass-input w-full px-4 py-3 rounded-lg focus:outline-none transition" id="mobile" name="mobile" type="text" placeholder="Enter mobile number" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-300 text-sm font-bold mb-2" for="password">
                    Password
                </label>
                <input class="glass-input w-full px-4 py-3 rounded-lg focus:outline-none transition" id="password" name="password" type="password" placeholder="******************" required>
            </div>
            
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center text-sm text-gray-400 cursor-pointer">
                    <input type="checkbox" class="mr-2 rounded glass-input bg-transparent border-gray-500 cursor-pointer">
                    Remember me
                </label>
                <a class="inline-block align-baseline text-sm text-blue-400 hover:text-blue-300 transition" href="#">
                    Forgot Password?
                </a>
            </div>
            
            <button class="premium-btn w-full font-bold py-3 px-4 rounded-lg focus:outline-none shadow-lg text-lg" type="submit">
                Login <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
            </button>
        </form>
        
        <div class="text-center mt-6">
            <p class="text-gray-400 text-sm">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-purple-400 hover:text-purple-300 font-bold transition">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
